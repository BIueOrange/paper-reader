# Manifest — paper-reader

source_format:
  values: [pdf-text, scanned-pdf, html, doi-arxiv, pasted-text]
  detect: |
    - pdf-text: user provides a PDF file path with selectable text layer (most common).
    - scanned-pdf: PDF whose pages render as images only (no extractable text layer).
    - html: user provides a publisher or preprint HTML URL.
    - doi-arxiv: user provides a bare DOI or arXiv identifier that must be resolved first.
    - pasted-text: user pastes paper text directly (no retrievable original layout).

always_load:
  - static/core/principles.md
  - static/core/workflow.md
  - static/core/output-contract.md

source_fragments:
  pdf-text: static/fragments/source/pdf-text.md
  scanned-pdf: static/fragments/source/scanned-pdf.md
  html: static/fragments/source/html.md
  doi-arxiv: static/fragments/source/doi-arxiv.md
  pasted-text: static/fragments/source/pasted-text.md

references:
  on_demand:
    figure-extraction: references/figure-extraction.md
    output-spec: references/output-spec.md
    critical-analysis: references/critical-analysis.md
